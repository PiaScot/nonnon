      <style>
        .shiny-banner {
          position: absolute;
          bottom: 0;
          width: 100%;
          background: linear-gradient(90deg, #ff0000, #cc0000, #ff0000);
          color: white;
          font-weight: bold;
          font-size: 18px;
          padding: 12px 0;
          text-align: center;
          overflow: hidden;
        }

        .shiny-banner::before {
          content: '';
          position: absolute;
          top: 0;
          left: -50%;
          width: 50%;
          height: 100%;
          background: linear-gradient(120deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 60%);
          transform: skewX(-20deg);
          animation: shineMove 2.5s infinite;
        }

        @keyframes shineMove {
          0% {
            left: -50%;
          }

          100% {
            left: 150%;
          }
        }

        /* 粒子 */
        .particles {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          overflow: hidden;
        }

        .particles::before,
        .particles::after {
          content: '';
          position: absolute;
          width: 8px;
          height: 8px;
          background: white;
          border-radius: 50%;
          opacity: 0.8;
          animation: particleMove 3s infinite linear;
        }

        .particles::after {
          width: 5px;
          height: 5px;
          animation-duration: 4s;
          animation-delay: 1s;
        }

        @keyframes particleMove {
          0% {
            transform: translateY(100%) translateX(0);
            opacity: 0.8;
          }

          50% {
            opacity: 0.5;
          }

          100% {
            transform: translateY(-100%) translateX(50px);
            opacity: 0;
          }
        }

        /* hoverでちょっと浮く */
        div[style*="box-shadow"]:hover {
          transform: translateY(-5px);
          transition: transform 0.3s;
        }

        /* 広告のスタイル調整 */
