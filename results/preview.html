<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Preview Tool (iPhone 16 Size)</title>
    <style>
      :root {
        --bg-color: #1a1a1a;
        --text-color: #e0e0e0;
        --primary-color: #00aaff;
        --border-color: #333;
        --header-height: 60px;
        /* --- iPhone 15/16相当のサイズ --- */
        --device-width: 393px;
        --device-height: 852px;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      .preview-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .preview-header {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        height: var(--header-height);
        background-color: #252525;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
        gap: 15px;
      }

      .preview-controls button,
      .preview-controls select {
        padding: 8px 16px;
        font-size: 14px;
        background-color: #333;
        color: var(--text-color);
        border: 1px solid #444;
        border-radius: 6px;
        cursor: pointer;
        transition:
          background-color 0.2s,
          border-color 0.2s;
      }

      .preview-controls button:hover,
      .preview-controls select:hover {
        background-color: #444;
        border-color: #555;
      }

      .preview-controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .site-info {
        font-size: 16px;
        font-weight: bold;
        min-width: 150px;
        text-align: center;
        background-color: #111;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
      }

      #current-site-id {
        color: var(--primary-color);
        font-family: "SF Mono", "Fira Code", "Menlo", monospace;
      }

      /* ▼▼▼ 変更箇所 ▼▼▼ */
      .preview-content {
        flex-grow: 1;
        height: calc(100% - var(--header-height));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
        overflow: auto; /* ウィンドウが小さい場合にスクロールさせる */
      }

      #preview-frame {
        width: var(--device-width);
        height: var(--device-height);
        flex-shrink: 0; /* 小さい画面でも縮まないようにする */
        border: 8px solid #000;
        border-radius: 40px; /* スマホの角丸を再現 */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        background-color: #fff;
      }
      /* ▲▲▲ 変更箇所 ▲▲▲ */
    </style>
  </head>
  <body>
    <div class="preview-container">
      <header class="preview-header">
        <div class="preview-controls">
          <button id="prev-btn">&laquo; Prev</button>
        </div>
        <div class="site-info">
          Site ID: <span id="current-site-id">...</span>
        </div>
        <div class="preview-controls">
          <select id="site-selector"></select>
        </div>
        <div class="preview-controls">
          <button id="next-btn">Next &raquo;</button>
        </div>
      </header>
      <main class="preview-content">
        <iframe id="preview-frame" title="Site Preview"></iframe>
      </main>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const excludedIds = new Set([33, 45, 48, 88, 90, 111]);

        const availableSiteIds = Array.from(
          { length: 118 },
          (_, i) => i + 1,
        ).filter((id) => !excludedIds.has(id));
        // =========================================================================

        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const currentSiteIdSpan = document.getElementById("current-site-id");
        const previewFrame = document.getElementById("preview-frame");
        const siteSelector = document.getElementById("site-selector");

        let currentIndex = 0;

        function updateView() {
          if (availableSiteIds.length === 0) return;

          const siteId = availableSiteIds[currentIndex];

          // Iframeのソースを更新
          previewFrame.src = `./site_${siteId}/index.html`;

          // 表示を更新
          currentSiteIdSpan.textContent = siteId;
          siteSelector.value = siteId;

          // ボタンの状態を更新
          prevBtn.disabled = currentIndex === 0;
          nextBtn.disabled = currentIndex === availableSiteIds.length - 1;
        }

        function populateSelector() {
          availableSiteIds.forEach((id) => {
            const option = document.createElement("option");
            option.value = id;
            option.textContent = `Site ${id}`;
            siteSelector.appendChild(option);
          });
        }

        // --- イベントリスナー ---
        prevBtn.addEventListener("click", () => {
          if (currentIndex > 0) {
            currentIndex--;
            updateView();
          }
        });

        nextBtn.addEventListener("click", () => {
          if (currentIndex < availableSiteIds.length - 1) {
            currentIndex++;
            updateView();
          }
        });

        siteSelector.addEventListener("change", (e) => {
          const selectedId = e.target.value;
          const newIndex = availableSiteIds.findIndex(
            (id) => id.toString() === selectedId,
          );
          if (newIndex !== -1) {
            currentIndex = newIndex;
            updateView();
          }
        });

        // --- 初期化 ---
        populateSelector();
        updateView();
      });
    </script>
  </body>
</html>
